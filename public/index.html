<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat WebSocket Render</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: white; margin: 0; }
    .container { max-width: 1000px; margin: auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
    .card { background: #111827; border-radius: 14px; padding: 18px; border: 1px solid #334155; }
    input, select, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 0; }
    button { background: #38bdf8; color: #082f49; font-weight: bold; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li { padding: 8px; border-bottom: 1px solid #334155; }
    .msg { background: #1e293b; margin: 8px 0; padding: 10px; border-radius: 10px; }
    .system { color: #facc15; font-style: italic; }
    .private { border-left: 4px solid #f472b6; }
    .sala-activa { background: #064e3b; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chat en tiempo real</h1>
    <p>Aplicación publicada con Node.js, Express, Socket.IO y Render.</p>

    <div class="card" id="registro">
      <h2>Registro</h2>

      <input id="nombre" placeholder="Escribe tu nombre" />

      <!-- ACTIVIDAD: agregar un campo de sala -->
      <select id="sala">
        <option value="general">General</option>
        <option value="soporte">Soporte</option>
        <option value="juegos">Juegos</option>
      </select>

      <button onclick="registrar()">Entrar al chat</button>
    </div>

    <div class="grid" id="chat" style="display:none">
      <div class="card">
        <h2>Usuarios conectados</h2>
        <ul id="usuarios"></ul>
      </div>

      <div class="card">
        <!-- ACTIVIDAD: mostrar visualmente la sala activa -->
        <div class="sala-activa">
          Sala activa: <strong id="salaActiva">general</strong>
        </div>

        <h2>Mensajes</h2>
        <div id="mensajes"></div>

        <h3>Cambiar sala</h3>
        <select id="nuevaSala">
          <option value="general">General</option>
          <option value="soporte">Soporte</option>
          <option value="juegos">Juegos</option>
        </select>
        <button onclick="cambiarSala()">Cambiar sala</button>

        <h3>Mensaje global</h3>
        <input id="mensaje" placeholder="Escribe un mensaje para la sala actual" />
        <button onclick="enviarGlobal()">Enviar a la sala</button>

        <h3>Mensaje privado</h3>
        <select id="destino"></select>
        <input id="mensajePrivado" placeholder="Mensaje privado" />
        <button onclick="enviarPrivado()">Enviar privado</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let miNombre = "";
    let miSala = "general";

    function registrar() {
      miNombre = document.getElementById("nombre").value.trim();

      // ACTIVIDAD: obtener la sala seleccionada por el usuario
      miSala = document.getElementById("sala").value;

      if (!miNombre) {
        alert("Escribe tu nombre");
        return;
      }

      // ACTIVIDAD: enviar nombre y sala al servidor
      socket.emit("registrarUsuario", {
        nombre: miNombre,
        sala: miSala
      });

      document.getElementById("registro").style.display = "none";
      document.getElementById("chat").style.display = "grid";
      document.getElementById("salaActiva").textContent = miSala;
      document.getElementById("nuevaSala").value = miSala;
    }

    function cambiarSala() {
      const nuevaSala = document.getElementById("nuevaSala").value;

      // ACTIVIDAD: permitir que el usuario cambie de sala
      socket.emit("cambiarSala", nuevaSala);

      document.getElementById("mensajes").innerHTML = "";
    }

    function enviarGlobal() {
      const input = document.getElementById("mensaje");
      const mensaje = input.value.trim();
      if (!mensaje) return;

      // ACTIVIDAD: este mensaje será enviado solo a la sala actual desde el servidor
      socket.emit("mensajeGlobal", {
        mensaje
      });

      input.value = "";
    }

    function enviarPrivado() {
      const destinoId = document.getElementById("destino").value;
      const input = document.getElementById("mensajePrivado");
      const mensaje = input.value.trim();
      if (!destinoId || !mensaje) return;

      socket.emit("mensajePrivado", {
        destinoId,
        usuario: miNombre,
        mensaje
      });

      agregarMensaje(`Privado enviado: ${mensaje}`, "private");
      input.value = "";
    }

    socket.on("usuariosActualizados", (usuarios) => {
      const lista = document.getElementById("usuarios");
      const destino = document.getElementById("destino");
      lista.innerHTML = "";
      destino.innerHTML = "<option value=''>Selecciona un usuario</option>";

      usuarios.forEach((usuario) => {
        const li = document.createElement("li");

        // ACTIVIDAD: mostrar la sala de cada usuario
        li.textContent = `${usuario.nombre} - Sala: ${usuario.sala}`;
        lista.appendChild(li);

        if (usuario.nombre !== miNombre) {
          const option = document.createElement("option");
          option.value = usuario.id;
          option.textContent = usuario.nombre;
          destino.appendChild(option);
        }
      });
    });

    socket.on("mensajeGlobal", (data) => {
      agregarMensaje(`${data.hora} [${data.sala}] ${data.usuario}: ${data.mensaje}`);
    });

    socket.on("mensajePrivado", (data) => {
      agregarMensaje(`${data.hora} - Privado de ${data.usuario}: ${data.mensaje}`, "private");
    });

    socket.on("mensajeSistema", (mensaje) => {
      agregarMensaje(mensaje, "system");
    });

    socket.on("salaActualizada", (sala) => {
      // ACTIVIDAD: actualizar visualmente la sala activa
      miSala = sala;
      document.getElementById("salaActiva").textContent = sala;
    });

    function agregarMensaje(texto, clase = "") {
      const div = document.createElement("div");
      div.className = `msg ${clase}`;
      div.textContent = texto;
      document.getElementById("mensajes").appendChild(div);
      div.scrollIntoView();
    }
  </script>
</body>
</html>
